name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # to create the version PR / git tags
  pull-requests: write # to open the "Version Packages" PR
  id-token: write # OIDC: trusted-publishing auth + provenance

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "Version Packages" PR when there are changesets,
      # and publishes to npm when that PR is merged.
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
        env:
          # No NPM_TOKEN: auth is via OIDC trusted publishing (configured on
          # npmjs.com → package → Settings → Trusted Publisher). The `id-token:
          # write` permission above does the handshake, and provenance is emitted
          # automatically. GITHUB_TOKEN is only for opening the version PR.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
