name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # to create the version PR / git tags
  pull-requests: write # to open the "Version Packages" PR
  id-token: write # for npm provenance

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "Version Packages" PR when there are changesets,
      # and publishes to npm when that PR is merged.
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Publish with npm provenance (signed attestation linking the package
          # to this repo + commit). Needs `id-token: write` above; CI-only, so a
          # local `pnpm release` still works (just without an attestation).
          NPM_CONFIG_PROVENANCE: true
